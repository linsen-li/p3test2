<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Color Transition Test</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif; }

/* Test canvas — fills entire screen */
#canvas { position: fixed; inset: 0; z-index: 0; }
#bg-layer { width: 100%; height: 100%; }
#square {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 40vmin; height: 40vmin;
}

/* Floating control toggle */
#toggle-btn {
  position: fixed; top: 12px; right: 12px; z-index: 100;
  width: 44px; height: 44px; border-radius: 22px;
  background: rgba(0,0,0,0.5); border: none; color: #fff;
  font-size: 20px; cursor: pointer; backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
}

/* Control panel */
#panel {
  position: fixed; top: 0; right: 0; z-index: 90;
  width: 340px; max-width: 90vw; height: 100%;
  background: rgba(30,30,30,0.92); backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  color: #f0f0f0; overflow-y: auto; padding: 56px 20px 20px;
  transform: translateX(100%); transition: transform 0.3s ease;
  -webkit-overflow-scrolling: touch;
}
#panel.open { transform: translateX(0); }

.section { margin-bottom: 20px; }
.section-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.5px; color: #8e8e93; margin-bottom: 8px;
  padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.1);
}

.row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.row label { font-size: 13px; font-weight: 500; min-width: 28px; text-align: right; }
.row input[type="range"] { flex: 1; height: 28px; }
.row .val {
  font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums;
  min-width: 32px; text-align: right;
}
.color-preview {
  width: 36px; height: 36px; border-radius: 6px;
  border: 2px solid rgba(255,255,255,0.3); flex-shrink: 0;
}

/* Number input (for GL/RGB) */
input[type="number"] {
  width: 56px; padding: 6px 4px; text-align: center;
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px; color: #fff; font-size: 14px; font-weight: 600;
  -moz-appearance: textfield;
}
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

input[type="range"] {
  -webkit-appearance: none; background: rgba(255,255,255,0.15); border-radius: 4px; height: 6px;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 22px; height: 22px;
  background: #fff; border-radius: 50%; border: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}

/* Square size slider */
.size-row { margin-top: 4px; }

/* Transition buttons */
.btn-row { display: flex; gap: 10px; margin-top: 4px; }
.btn {
  flex: 1; padding: 14px 8px; border: none; border-radius: 10px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: transform 0.1s;
}
.btn:active { transform: scale(0.96); }
.btn-instant { background: #007aff; color: #fff; }
.btn-delay { background: #ff9500; color: #fff; }
.btn-reset { background: rgba(255,255,255,0.15); color: #fff; }
.btn-fullscreen { background: #34c759; color: #fff; }

/* Countdown overlay */
#countdown {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 50; font-size: 80px; font-weight: 800; color: rgba(255,255,255,0.7);
  text-shadow: 0 2px 20px rgba(0,0,0,0.5); display: none;
  pointer-events: none;
}

/* Status bar at bottom */
#status {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 80;
  padding: 6px 16px; font-size: 11px; font-weight: 500;
  background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.7);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: flex; justify-content: space-between;
  padding-bottom: max(6px, env(safe-area-inset-bottom));
}

/* Preset buttons */
.preset-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.preset {
  padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
  border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08);
  color: #fff; cursor: pointer;
}
.preset:active { background: rgba(255,255,255,0.2); }

/* Delay input */
.delay-input { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.delay-input label { font-size: 13px; }
</style>
</head>
<body>

<!-- Test canvas -->
<div id="canvas">
  <div id="bg-layer"></div>
  <div id="square"></div>
</div>

<!-- Countdown -->
<div id="countdown"></div>

<!-- Toggle controls -->
<button id="toggle-btn" onclick="togglePanel()">&#9881;</button>

<!-- Control panel -->
<div id="panel">

  <div class="section">
    <div class="section-title">Background White Point</div>
    <div class="row">
      <label>GL</label>
      <input type="range" id="wp-slider" min="0" max="255" value="128" oninput="updateWP()">
      <input type="number" id="wp-val" min="0" max="255" value="128" onchange="wpFromNum()">
    </div>
  </div>

  <div class="section">
    <div class="section-title">1st Frame Square (Before)</div>
    <div class="row">
      <label style="color:#ff453a">R</label>
      <input type="range" id="f1-r" min="0" max="255" value="255" oninput="updateFrame1()">
      <input type="number" id="f1-r-val" min="0" max="255" value="255" onchange="f1FromNum('r')">
    </div>
    <div class="row">
      <label style="color:#30d158">G</label>
      <input type="range" id="f1-g" min="0" max="255" value="0" oninput="updateFrame1()">
      <input type="number" id="f1-g-val" min="0" max="255" value="0" onchange="f1FromNum('g')">
    </div>
    <div class="row">
      <label style="color:#0a84ff">B</label>
      <input type="range" id="f1-b" min="0" max="255" value="0" oninput="updateFrame1()">
      <input type="number" id="f1-b-val" min="0" max="255" value="0" onchange="f1FromNum('b')">
    </div>
    <div class="row">
      <label></label>
      <div>Preview:</div>
      <div class="color-preview" id="f1-preview"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">2nd Frame Square (After)</div>
    <div class="row">
      <label style="color:#ff453a">R</label>
      <input type="range" id="f2-r" min="0" max="255" value="0" oninput="updateFrame2()">
      <input type="number" id="f2-r-val" min="0" max="255" value="0" onchange="f2FromNum('r')">
    </div>
    <div class="row">
      <label style="color:#30d158">G</label>
      <input type="range" id="f2-g" min="0" max="255" value="255" oninput="updateFrame2()">
      <input type="number" id="f2-g-val" min="0" max="255" value="255" onchange="f2FromNum('g')">
    </div>
    <div class="row">
      <label style="color:#0a84ff">B</label>
      <input type="range" id="f2-b" min="0" max="255" value="0" oninput="updateFrame2()">
      <input type="number" id="f2-b-val" min="0" max="255" value="0" onchange="f2FromNum('b')">
    </div>
    <div class="row">
      <label></label>
      <div>Preview:</div>
      <div class="color-preview" id="f2-preview"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Square Size</div>
    <div class="row">
      <label>%</label>
      <input type="range" id="sq-size" min="5" max="100" value="40" oninput="updateSize()">
      <span class="val" id="sq-size-val">40</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Transition Delay</div>
    <div class="delay-input">
      <label>Delay:</label>
      <input type="number" id="delay-sec" min="0" max="60" value="10" style="width:60px">
      <label>seconds</label>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Presets</div>
    <div class="preset-row">
      <button class="preset" onclick="applyPreset(255,0,0, 0,0,0)">R→Black</button>
      <button class="preset" onclick="applyPreset(0,255,0, 0,0,0)">G→Black</button>
      <button class="preset" onclick="applyPreset(0,0,255, 0,0,0)">B→Black</button>
      <button class="preset" onclick="applyPreset(255,0,0, 0,255,0)">R→G</button>
      <button class="preset" onclick="applyPreset(0,255,0, 0,0,255)">G→B</button>
      <button class="preset" onclick="applyPreset(255,255,255, 0,0,0)">W→Black</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Actions</div>
    <div class="btn-row">
      <button class="btn btn-instant" onclick="doTransition(false)">Instant</button>
      <button class="btn btn-delay" onclick="doTransition(true)">Delay</button>
    </div>
    <div class="btn-row" style="margin-top:10px">
      <button class="btn btn-reset" onclick="resetToFrame1()">Reset to 1st</button>
      <button class="btn btn-fullscreen" onclick="goFullscreen()">Fullscreen</button>
    </div>
  </div>

</div>

<!-- Status bar -->
<div id="status">
  <span id="st-bg">BG: GL 128</span>
  <span id="st-sq">Square: [255,0,0]</span>
  <span id="st-state">Ready</span>
</div>

<script>
var state = {
  wp: 128,
  f1: [255, 0, 0],
  f2: [0, 255, 0],
  sqSize: 40,
  currentFrame: 1,
  transitioning: false,
};

var countdownTimer = null;

function rgb(r,g,b) { return 'rgb('+r+','+g+','+b+')'; }

function updateWP() {
  var v = parseInt(document.getElementById('wp-slider').value);
  document.getElementById('wp-val').value = v;
  state.wp = v;
  document.getElementById('bg-layer').style.background = rgb(v, v, v);
  document.getElementById('st-bg').textContent = 'BG: GL ' + v;
}

function wpFromNum() {
  var v = clamp(parseInt(document.getElementById('wp-val').value) || 0, 0, 255);
  document.getElementById('wp-val').value = v;
  document.getElementById('wp-slider').value = v;
  state.wp = v;
  document.getElementById('bg-layer').style.background = rgb(v, v, v);
  document.getElementById('st-bg').textContent = 'BG: GL ' + v;
}

function updateFrame1() {
  var r = parseInt(document.getElementById('f1-r').value);
  var g = parseInt(document.getElementById('f1-g').value);
  var b = parseInt(document.getElementById('f1-b').value);
  document.getElementById('f1-r-val').value = r;
  document.getElementById('f1-g-val').value = g;
  document.getElementById('f1-b-val').value = b;
  state.f1 = [r, g, b];
  document.getElementById('f1-preview').style.background = rgb(r, g, b);
  if (state.currentFrame === 1) applySquareColor(state.f1);
}

function f1FromNum(ch) {
  var v = clamp(parseInt(document.getElementById('f1-'+ch+'-val').value) || 0, 0, 255);
  document.getElementById('f1-'+ch+'-val').value = v;
  document.getElementById('f1-'+ch).value = v;
  updateFrame1();
}

function updateFrame2() {
  var r = parseInt(document.getElementById('f2-r').value);
  var g = parseInt(document.getElementById('f2-g').value);
  var b = parseInt(document.getElementById('f2-b').value);
  document.getElementById('f2-r-val').value = r;
  document.getElementById('f2-g-val').value = g;
  document.getElementById('f2-b-val').value = b;
  state.f2 = [r, g, b];
  document.getElementById('f2-preview').style.background = rgb(r, g, b);
  if (state.currentFrame === 2) applySquareColor(state.f2);
}

function f2FromNum(ch) {
  var v = clamp(parseInt(document.getElementById('f2-'+ch+'-val').value) || 0, 0, 255);
  document.getElementById('f2-'+ch+'-val').value = v;
  document.getElementById('f2-'+ch).value = v;
  updateFrame2();
}

function updateSize() {
  var v = parseInt(document.getElementById('sq-size').value);
  document.getElementById('sq-size-val').textContent = v;
  state.sqSize = v;
  var sq = document.getElementById('square');
  sq.style.width = v + 'vmin';
  sq.style.height = v + 'vmin';
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function applySquareColor(c) {
  document.getElementById('square').style.background = rgb(c[0], c[1], c[2]);
  document.getElementById('st-sq').textContent = 'Square: [' + c.join(',') + ']';
}

function resetToFrame1() {
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
  document.getElementById('countdown').style.display = 'none';
  state.currentFrame = 1;
  state.transitioning = false;
  applySquareColor(state.f1);
  document.getElementById('st-state').textContent = 'Frame 1';
}

function doTransition(withDelay) {
  if (state.transitioning) return;

  // Always start from frame 1
  resetToFrame1();

  if (!withDelay) {
    // Instant transition
    state.currentFrame = 2;
    applySquareColor(state.f2);
    document.getElementById('st-state').textContent = 'Frame 2 (instant)';
    return;
  }

  // Delayed transition
  state.transitioning = true;
  var delaySec = parseInt(document.getElementById('delay-sec').value) || 10;
  var remaining = delaySec;
  var cdEl = document.getElementById('countdown');
  cdEl.style.display = 'block';
  cdEl.textContent = remaining;
  document.getElementById('st-state').textContent = 'Waiting ' + delaySec + 's...';

  // Close panel during countdown
  document.getElementById('panel').classList.remove('open');

  countdownTimer = setInterval(function() {
    remaining--;
    if (remaining <= 0) {
      clearInterval(countdownTimer);
      countdownTimer = null;
      cdEl.style.display = 'none';
      state.currentFrame = 2;
      state.transitioning = false;
      applySquareColor(state.f2);
      document.getElementById('st-state').textContent = 'Frame 2 (after ' + delaySec + 's)';
    } else {
      cdEl.textContent = remaining;
      document.getElementById('st-state').textContent = 'Transition in ' + remaining + 's';
    }
  }, 1000);
}

function applyPreset(r1,g1,b1, r2,g2,b2) {
  document.getElementById('f1-r').value = r1; document.getElementById('f1-r-val').value = r1;
  document.getElementById('f1-g').value = g1; document.getElementById('f1-g-val').value = g1;
  document.getElementById('f1-b').value = b1; document.getElementById('f1-b-val').value = b1;
  state.f1 = [r1, g1, b1];
  document.getElementById('f1-preview').style.background = rgb(r1, g1, b1);

  document.getElementById('f2-r').value = r2; document.getElementById('f2-r-val').value = r2;
  document.getElementById('f2-g').value = g2; document.getElementById('f2-g-val').value = g2;
  document.getElementById('f2-b').value = b2; document.getElementById('f2-b-val').value = b2;
  state.f2 = [r2, g2, b2];
  document.getElementById('f2-preview').style.background = rgb(r2, g2, b2);

  resetToFrame1();
}

function togglePanel() {
  document.getElementById('panel').classList.toggle('open');
}

function goFullscreen() {
  var el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  document.getElementById('panel').classList.remove('open');
}

// Init
updateWP();
updateFrame1();
updateFrame2();
updateSize();
resetToFrame1();
</script>
</body>
</html>
